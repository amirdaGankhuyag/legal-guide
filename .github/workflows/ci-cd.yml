# LegalGuide CI/CD pipeline

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legal-guide-backend
    steps:
      # Repo-ийн кодыг CI серверт татаж авна
      - uses: actions/checkout@v5

      # Node.js суулгаж, npm cache ашиглан дараагийн ажиллагааг хурдасгана
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: legal-guide-backend/package-lock.json

      # npm ci = package-lock.json-д яг заасан хувилбаруудыг суулгана (npm install-оос найдвартай)
      - run: npm ci

      # node --test — MyError, asyncHandler, errorHandler тестүүд
      - run: npm test

  frontend-test:
    name: Frontend lint + tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legal-guide-frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: legal-guide-frontend/package-lock.json

      - run: npm ci

      # ESLint — кодын чанарын шалгалт (error гарвал унана)
      - run: npm run lint

      # Vitest — photoSrc зэрэг unit тестүүд
      - run: npm test

      # Build шалгалт — Linux дээр case-sensitivity зэрэг алдааг барина
      - run: npm run build

  # ─── Render deploy (зөвхөн тестүүд амжилттай үед) ─────────────────
  deploy-backend:
    name: Deploy backend to Render
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Render-ийн Deploy Hook = нууц URL руу POST илгээхэд deploy эхэлдэг.
      # --fail туг нь Render алдаа буцаавал энэ алхмыг унагаж, pipeline дээр улаанаар харуулна
      - run: curl --fail --request POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ─── Vercel deploy (зөвхөн тестүүд амжилттай үед) ─────────────────
  deploy:
    name: Deploy to Vercel
    needs: [backend-test, frontend-test]
    # PR дээр deploy хийхгүй, зөвхөн main руу push хийгдсэн үед
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install -g vercel

      # Vercel-ийн project тохиргоо, env хувьсагчдыг татна
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # CI сервер дээр build хийнэ (Vercel-ийн орчинд биш — тиймээс "prebuilt")
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Бэлэн build-ийг production руу гаргана
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
